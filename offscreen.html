<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Moon Rider — webcam preview</title>
    <style>
      body { margin: 0; background: #0b0b0f; color: #cdd6e0;
             font: 13px/1.45 ui-monospace, Menlo, Consolas, monospace; }
      #wrap { position: relative; width: 640px; height: 480px; max-width: 100vw; }
      #cam, #overlay { position: absolute; top: 0; left: 0; width: 640px; height: 480px; }
      #cam { transform: scaleX(-1); background: #000; }      /* selfie mirror */
      #overlay { transform: scaleX(-1); pointer-events: none; }
      #hud { padding: 8px 12px; white-space: pre; }
      .ok { color: #5fdb7a; } .warn { color: #f5c451; } .bad { color: #ff5d5d; }
      .dim { color: #6b7480; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <video id="cam" autoplay playsinline muted width="640" height="480"></video>
      <canvas id="overlay" width="640" height="480"></canvas>
    </div>
    <div id="hud">starting…</div>
    <script type="module" src="offscreen.js"></script>
    <script src="joycon.js"></script>
  </body>
</html>
